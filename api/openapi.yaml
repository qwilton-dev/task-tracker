openapi: 3.0.3
info:
  title: Task Tracker API
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: {type: string}
                password: {type: string}
                name: {type: string}
      responses:
        '201': {description: Created}
  /auth/login:
    post:
      summary: Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string}
                password: {type: string}
      responses:
        '200': {description: OK}
  /auth/refresh:
    post:
      summary: Refresh access token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: {type: string}
      responses:
        '200': {description: OK}
  /auth/logout:
    post:
      summary: Logout and revoke refresh token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: {type: string}
      responses:
        '200': {description: OK}
  /me:
    get:
      summary: Get current user
      security:
        - BearerAuth: []
      responses:
        '200': {description: OK}
  /workspaces:
    post:
      summary: Create a workspace
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: {type: string}
                slug: {type: string}
      responses:
        '201': {description: Created}
    get:
      summary: List workspaces
      security:
        - BearerAuth: []
      responses:
        '200': {description: OK}
  /workspaces/{workspaceSlug}/projects:
    post:
      summary: Create a project
      security:
        - BearerAuth: []
      parameters:
        - name: workspaceSlug
          in: path
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, key]
              properties:
                name: {type: string}
                key: {type: string, pattern: '^[A-Z]{2,5}$'}
      responses:
        '201': {description: Created}
        '403': {description: Forbidden}
    get:
      summary: List projects
      security:
        - BearerAuth: []
      parameters:
        - name: workspaceSlug
          in: path
          required: true
          schema: {type: string}
      responses:
        '200': {description: OK}
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
